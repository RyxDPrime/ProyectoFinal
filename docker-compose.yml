services:
  mongo:
    image: mongo:7.0
    container_name: proyecto-final-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-encuesta_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?define MONGO_INITDB_ROOT_PASSWORD in your .env}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-encuesta}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test \"$$(mongosh --quiet \\\"mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin?authSource=admin\\\" --eval 'db.runCommand({ ping: 1 }).ok')\" = \"1\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto-final-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      PORT: ${PORT:-8000}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-encuesta_admin}:${MONGO_INITDB_ROOT_PASSWORD:?define MONGO_INITDB_ROOT_PASSWORD in your .env or environment}@mongo:27017/${MONGO_DB:-encuesta}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET in your .env or environment}
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge


