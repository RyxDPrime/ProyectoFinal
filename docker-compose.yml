version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto-final-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Puerto interno
      PORT: ${PORT:-8000}

      # MongoDB Atlas URI (desde .env)
      MONGO_URI: ${MONGO_URI:?Error: MONGO_URI no definida en .env}

      # JWT Secret para tokens
      JWT_SECRET: ${JWT_SECRET:?Error: JWT_SECRET no definida en .env}

      # Ambiente
      ENV: ${ENV:-production}

    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Proxy Envoy (opcional, para gRPC)
  envoy:
    image: envoyproxy/envoy:v1.27-latest
    container_name: proyecto-final-envoy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    driver: bridge
