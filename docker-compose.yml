services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto-final-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET in your .env or environment}
      MONGO_URI: "${MONGO_URI:?Error: MONGO_URI no definida en .env}"


