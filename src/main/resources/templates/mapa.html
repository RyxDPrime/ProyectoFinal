<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encuesta PUCMM — Mapa</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: calc(100vh - 56px - 80px);
      min-height: 400px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }
    .leaflet-popup-content-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .leaflet-popup-tip { background: var(--bg-card); }
    .popup-nombre { font-family: var(--font-mono), monospace; font-weight: 700; font-size: 0.85rem; }
    .popup-meta   { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .popup-coords { font-family: var(--font-mono), monospace; font-size: 0.7rem; color: #0D6EFD; margin-top: 4px; }
    .popup-foto   { width: 100%; max-height: 120px; object-fit: cover; border-radius: var(--radius); margin-top: 8px; }
    .map-filter-bar {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
    }
    .map-filter-bar select,
    .map-filter-bar input { max-width: 200px; }
    .map-counter {
      font-family: var(--font-mono), monospace; font-size: 0.75rem; color: var(--text-muted);
      margin-left: auto;
    }
  </style>
</head>
<body>

<div class="app-layout">

  <header class="topbar">
    <div class="topbar-brand"><div class="accent-dot"></div>ENCUESTA_PUCMM</div>
    <div class="topbar-right">
      <div class="conn-status">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">En línea</span>
      </div>
      <div class="topbar-user">
        <span id="topbar-nombre">—</span>
        <span class="role-badge" id="topbar-rol">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Salir</button>
      <button class="btn btn-ghost btn-sm" id="menu-toggle" onclick="toggleMenu()" style="display:none;padding:4px 8px">☰</button>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="nav-section-label" data-feature="captura">Captura</div>
    <div class="nav-section" data-feature="captura">
      <a href="/encuesta" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Nueva encuesta
      </a>
      <a href="/bandeja" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/></svg>
        Bandeja de salida
        <span class="nav-badge zero" id="nav-badge-pending">0</span>
      </a>
    </div>
    <div class="nav-section-label">Reportes</div>
    <div class="nav-section">
      <a href="/listado" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        Listado general
      </a>
      <a href="/dashboard" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 15l3-4 3 2 4-6"/></svg>
        Dashboard
      </a>
      <a href="/mapa" class="nav-link active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        Mapa
      </a>
    </div>
    <div class="nav-section-label" id="nav-admin-label" data-feature="admin" style="display:none">Administración</div>
    <div class="nav-section" id="nav-admin-section" data-feature="admin" style="display:none">
      <a href="/usuarios" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Usuarios
      </a>
    </div>
  </nav>

  <main class="main-content page-enter">
    <div class="page-header" style="margin-bottom:16px">
      <div class="page-header-left">
        <h1>Mapa de encuestas</h1>
        <p>Puntos georeferenciados de todas las encuestas en el servidor.</p>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <select id="filtro-scope" style="width:190px; display:none" onchange="cargarYRenderizar()">
          <option value="mine">Mis encuestas</option>
          <option value="all">Listado general</option>
        </select>
        <button class="btn btn-secondary" onclick="cargarYRenderizar()">↻ Actualizar</button>
      </div>
    </div>

    <div class="map-filter-bar">
      <label for="filtro-nivel-mapa"></label><select id="filtro-nivel-mapa" onchange="aplicarFiltros()">
      <option value="">Todos los niveles</option>
      <option value="BASICO">Básico</option>
      <option value="MEDIO">Medio</option>
      <option value="GRADO_UNIVERSITARIO">Universitario</option>
      <option value="POSTGRADO">Postgrado</option>
      <option value="DOCTORADO">Doctorado</option>
    </select>
      <label for="filtro-sector-mapa"></label><input type="text" id="filtro-sector-mapa" placeholder="Filtrar por sector..." oninput="aplicarFiltros()" />
      <span class="map-counter" id="map-counter">— puntos</span>
    </div>

    <div id="map"></div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  Auth.requerirAuth();
  Auth.requerirAccesoRuta();

  const usuario = Auth.getUsuario();
  document.getElementById('topbar-nombre').textContent = usuario.nombre || usuario.email;
  document.getElementById('topbar-rol').textContent    = usuario.rol;
  if (usuario.rol === 'ADMIN') {
    document.getElementById('nav-admin-label').style.display = '';
    document.getElementById('nav-admin-section').style.display = '';
  }

  if (usuario.rol === 'ENCUESTADOR' || usuario.rol === 'ADMIN') {
    const scopeSelect = document.getElementById('filtro-scope');
    scopeSelect.style.display = '';
    scopeSelect.value = usuario.rol === 'ENCUESTADOR' ? 'mine' : 'all';
  }
  Auth.aplicarVisibilidadPorRol();

  const pend = OfflineDB.contarPendientes();
  const badge = document.getElementById('nav-badge-pending');
  badge.textContent = pend;
  badge.className = 'nav-badge' + (pend === 0 ? ' zero' : '');

  document.getElementById('conn-dot').classList.toggle('offline', !navigator.onLine);
  document.getElementById('conn-label').textContent = navigator.onLine ? 'En línea' : 'Sin conexión';


  const map = L.map('map', { zoomControl: true })
          .setView([18.4861, -69.9312], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  const iconoAmbar = L.divIcon({
    className: '',
    html: `<div style="
       width:12px; height:12px;
       background:#0D6EFD;
       border: 2px solid #FFFFFF;
       border-radius: 50%;
       box-shadow: 0 0 8px rgba(13,110,253,0.5);
     "></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6],
  });

  let todasEncuestas = [];
  let markers = [];
  let recargaTimer = null;
  let refreshTimer = null;
  const nivelLabel = {
    BASICO: 'Básico', MEDIO: 'Medio', GRADO_UNIVERSITARIO: 'Universitario',
    POSTGRADO: 'Postgrado', DOCTORADO: 'Doctorado'
  };

  async function cargarYRenderizar() {
    try {
      const scope = getScopeActual();
      todasEncuestas = await API.get(`/api/encuestas?scope=${encodeURIComponent(scope)}`);
      aplicarFiltros();
    } catch (err) {
      toast('Error cargando encuestas: ' + err.message, 'error');
    }
  }

  function getScopeActual() {
    const scopeSelect = document.getElementById('filtro-scope');
    if (scopeSelect.style.display !== 'none') {
      return scopeSelect.value || 'all';
    }
    return 'all';
  }

  function aplicarFiltros() {
    const nivel  = document.getElementById('filtro-nivel-mapa').value;
    const sector = document.getElementById('filtro-sector-mapa').value.toLowerCase();

    const filtradas = todasEncuestas.filter(e =>
            e.latitud && e.longitud &&
            (!nivel  || e.nivelEscolar === nivel) &&
            (!sector || e.sector?.toLowerCase().includes(sector))
    );

    renderMarcadores(filtradas);
  }

  function renderMarcadores(encuestas) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    document.getElementById('map-counter').textContent = `${encuestas.length} punto${encuestas.length !== 1 ? 's' : ''}`;

    encuestas.forEach(enc => {
      const lat = parseFloat(enc.latitud);
      const lng = parseFloat(enc.longitud);
      if (isNaN(lat) || isNaN(lng)) return;

      const marker = L.marker([lat, lng], { icon: iconoAmbar });

      const popup = `
        <div style="min-width:180px; padding:4px">
          <div class="popup-nombre">${enc.nombre || '—'}</div>
          <div class="popup-meta">
            ${enc.sector || '—'} &nbsp;·&nbsp;
            ${nivelLabel[enc.nivelEscolar] || enc.nivelEscolar || '—'}
          </div>
          <div class="popup-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
          ${enc.fotoBase64
              ? `<img class="popup-foto" src="${enc.fotoBase64}" alt="Foto" />`
              : ''}
          <div class="popup-meta" style="margin-top:6px">${enc.usuarioNombre || ''}</div>
        </div>`;

      marker.bindPopup(popup, { maxWidth: 240 });
      marker.addTo(map);
      markers.push(marker);
    });

    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
    }
  }

  function programarRecargaRealtime() {
    clearTimeout(recargaTimer);
    recargaTimer = setTimeout(() => {
      cargarYRenderizar();
    }, 250);
  }

  function manejarEventoRealtime(msg) {
    console.log('[WS] Evento recibido (mapa):', msg);
  }

  window.addEventListener('beforeunload', () => RealtimeWS.detener());
  window.addEventListener('beforeunload', () => {
    if (refreshTimer) clearInterval(refreshTimer);
  });

  cargarYRenderizar();
</script>
</body>
</html>
