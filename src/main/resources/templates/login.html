<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuesta PUCMM — Iniciar sesión</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .login-page::before {
            content: '';
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, transparent, #0D6EFD, transparent);
        }
        .login-box {
            background: rgba(255,255,255,0.98);
            border: 1px solid #DEE2E6;
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 400px;
        }
        .login-corner {
            font-family: var(--font-mono), monospace;
            font-size: 0.6rem;
            color: var(--text-faint);
            letter-spacing: 0.1em;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
        }
        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .login-footer a {
            color: #0D6EFD;
            font-family: var(--font-mono), monospace;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>

<div class="login-page" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1">
    <div class="login-box">

        <div class="login-corner">
            <span>SYS::AUTH / LOGIN</span>
            <span id="clock">--:--:--</span>
        </div>

        <div class="login-brand">
            <h1><span style="color:var(--accent)">ENCUESTA_PUCMM</span></h1>
            <div class="login-separator"></div>
            <div class="sub">Iniciar sesión</div>
        </div>

        <form id="form-login" style="margin-top:28px" novalidate>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <label for="login-email"></label><input type="email" id="login-email" placeholder="usuario@pucmm.edu.do"
                                                        required autocomplete="email" />
            </div>

            <div class="form-group">
                <label>Contraseña <span class="required">*</span></label>
                <label for="login-pwd"></label><input type="password" id="login-pwd" placeholder="••••••••"
                                                      required autocomplete="current-password" />
            </div>

            <div class="form-error" id="login-error" style="margin-bottom:14px"></div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">
                <span class="spinner"></span>
                <span class="btn-text">Iniciar sesión</span>
            </button>

        </form>

        <div class="login-footer">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </div>

    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/app.js"></script>
<script>
    setInterval(() => {
        document.getElementById('clock').textContent =
            new Date().toLocaleTimeString('es-DO');
    }, 1000);

    if (Auth.estaAutenticado()) {
        window.location.href = Auth.getRutaInicioPorRol();
    }

    document.getElementById('form-login')?.addEventListener('submit', handleLogin);

    async function handleLogin(e) {
        e.preventDefault();
        const btn     = document.getElementById('btn-login');
        const errorEl = document.getElementById('login-error');
        const email   = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-pwd').value;

        btn.classList.add('loading');
        btn.disabled = true;
        errorEl.classList.remove('visible');

        if (!email) {
            errorEl.textContent = 'Ingresa tu correo';
            errorEl.classList.add('visible');
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
        }

        const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!emailValido) {
            errorEl.textContent = 'Ingresa un correo valido';
            errorEl.classList.add('visible');
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
        }

        if (!password) {
            errorEl.textContent = 'Ingresa tu contraseña';
            errorEl.classList.add('visible');
            btn.classList.remove('loading');
            btn.disabled = false;
            return;
        }

        try {
            await Auth.login(email, password);
            window.location.href = Auth.getRutaInicioPorRol();
        } catch (err) {
            errorEl.textContent = err.message || 'Credenciales incorrectas';
            errorEl.classList.add('visible');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
