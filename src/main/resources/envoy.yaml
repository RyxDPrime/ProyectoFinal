# envoy.yaml — Proxy gRPC-Web para el cliente browser
#
# Envoy traduce peticiones gRPC-Web (HTTP/1.1 desde el browser)
# a gRPC nativo (HTTP/2 hacia el servidor Javalin).
#
# Flujo:
#   Browser (gRPC-Web, puerto 8080)
#     → Envoy (este archivo)
#       → Servidor Javalin gRPC (puerto 9090)
#
# Uso:
#   docker run -v $(pwd)/envoy.yaml:/etc/envoy/envoy.yaml \
#     -p 8080:8080 envoyproxy/envoy:v1.29-latest

static_resources:

  listeners:
    - name: listener_grpc_web
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080

      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_grpc
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: grpc_service
                      domains: ["localhost:8080", "127.0.0.1:8080"]
                      cors:
                        allow_origin_string_match:
                          - exact: "http://localhost:8000"
                          - exact: "http://127.0.0.1:8000"
                        allow_methods: "POST, OPTIONS"
                        allow_headers: "keep-alive,user-agent,cache-control,content-type,x-grpc-web,grpc-timeout,authorization"
                        expose_headers: "grpc-status,grpc-message,grpc-status-details-bin"
                        max_age: "1728000"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: grpc_backend
                            timeout: 60s
                http_filters:
                  # Filtro gRPC-Web: convierte gRPC-Web → gRPC
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  # CORS para peticiones desde el browser
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: grpc_backend
      connect_timeout: 5s
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      # HTTP/2 requerido para gRPC
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: grpc_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # "host.docker.internal" permite acceder al Javalin
                      # corriendo fuera de Docker (en el host)
                      address: host.docker.internal
                      port_value: 9090

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901